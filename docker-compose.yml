name: stackgen

services:
  site:
    build:
      context: .
      dockerfile: Dockerfile
    image: stackgen-web:latest
    container_name: stackgen-web
    restart: unless-stopped
    networks:
      - proxy-net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  proxy-net:
    external: true